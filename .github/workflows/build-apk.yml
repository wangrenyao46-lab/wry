name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev libffi-dev python3-dev \
          openjdk-11-jdk \
          git wget zip unzip \
          libtool libtool-bin autoconf automake \
          pkg-config m4 libltdl-dev

    - name: Download and extract NDK r23b
      run: |
        NDK_VERSION="r23b"
        NDK_ZIP="android-ndk-${NDK_VERSION}-linux.zip"
        # 使用清华镜像
        wget -q https://mirrors.tuna.tsinghua.edu.cn/android/repository/${NDK_ZIP}
        mkdir -p $HOME/android-ndk
        unzip -q ${NDK_ZIP} -d $HOME/android-ndk/
        # 移动并重命名目录
        mv $HOME/android-ndk/android-ndk-${NDK_VERSION} $HOME/ndk
        echo "NDK_PATH=$HOME/ndk" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Build APK with Buildozer
      run: buildozer android debug
      env:
        ANDROID_ACCEPT_SDK_LICENSE: "1"
        ANDROIDNDK: ${{ env.NDK_PATH }}
        # 覆盖 GitHub 自带的 NDK 路径
        ANDROID_NDK_HOME: ${{ env.NDK_PATH }}
        ANDROID_NDK_ROOT: ${{ env.NDK_PATH }}

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: shop-points-app
        path: bin/*.apk
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
