name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libssl-dev libffi-dev python3-dev \
          openjdk-11-jdk \
          git wget zip unzip \
          libtool libtool-bin autoconf automake \
          pkg-config m4 libltdl-dev

    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r23b
        add-to-path: false
        local-cache: true

    - name: Set NDK environment variable
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV
        echo "NDK_PATH=$ANDROID_HOME/ndk-bundle" >> $GITHUB_ENV

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cython buildozer

    - name: Build APK with Buildozer
      run: buildozer android debug
      env:
        ANDROID_ACCEPT_SDK_LICENSE: "1"
        ANDROIDNDK: ${{ env.ANDROID_NDK_HOME }}

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: myapp-debug
        path: bin/*.apk
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: bin/*.apk
        tag_name: v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
